<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Clean Cards</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#0b0b0b;color:#fff;margin:0;display:flex;min-height:100vh;align-items:center;justify-content:center}
      .card{max-width:520px;padding:28px;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:rgba(255,255,255,.04)}
      h1{margin:0 0 10px;font-size:22px}
      p{margin:0 0 14px;opacity:.85;line-height:1.35}
      .hint{font-size:13px;opacity:.7}
      button{background:#fff;color:#000;border:0;border-radius:12px;padding:10px 14px;font-weight:600;cursor:pointer}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>Clean Cards can still show cached screens, but live pricing, cloud sync, and uploads need a connection.</p>
      <button onclick="location.reload()">Try again</button>
      <p class="hint">Tip: If you’re mid-scan, reopen the scanner after reconnecting.</p>
    </div>
  </body>
</html>
